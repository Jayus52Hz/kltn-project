version: '3.8'

services:
  # ==========================================
  # 1. TẦNG SOURCE DATABASES
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - data-pipeline-network

  # [FIX 1] Init container: khởi tạo MongoDB ReplicaSet (bắt buộc cho Debezium CDC)
  # Chạy rs.initiate() một lần, idempotent (nếu đã init rồi thì skip)
  mongo-init:
    image: mongo:6.0
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongodb:27017 --eval
      'try { rs.status(); print("ReplicaSet already initialized") }
       catch(e) { rs.initiate({_id:"rs0", members:[{_id:0, host:"mongodb:27017"}]}); print("ReplicaSet initialized") }'
    networks:
      - data-pipeline-network

  postgres:
    image: postgres:13
    container_name: postgres_metadata
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: metadata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d metadata_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline-network

  # ==========================================
  # 2. TẦNG STREAMING & CDC
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      # [FIX 3] Khai báo rõ listener nội bộ để tránh warning và lỗi broker giao tiếp
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - data-pipeline-network

  debezium_connect:
    image: debezium/connect:2.1
    container_name: debezium_connect
    # [FIX 3] Chờ Kafka sẵn sàng VÀ MongoDB đã được rs.initiate() xong
    depends_on:
      kafka:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - data-pipeline-network

  # ==========================================
  # 3. TẦNG STORAGE (MINIO)
  # ==========================================
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline-network

  minio-mc:
    image: minio/mc
    container_name: minio-mc
    # [FIX 3] Chờ MinIO healthy, bỏ sleep 5 hardcoded
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/bronze || true;
      mc mb myminio/silver || true;
      mc mb myminio/gold || true;
      mc mb myminio/lakehouse || true;
      exit 0;
      "
    networks:
      - data-pipeline-network

  # ==========================================
  # 4. TẦNG COMPUTE (APACHE SPARK + ICEBERG)
  # ==========================================
  spark-master:
    image: apache/spark:3.4.0
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./batch-etl:/opt/spark/work-dir/batch-etl
    networks:
      - data-pipeline-network

  spark-worker:
    image: apache/spark:3.4.0
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./batch-etl:/opt/spark/work-dir/batch-etl
    networks:
      - data-pipeline-network

  # ==========================================
  # 5. TẦNG ORCHESTRATION & BI
  # ==========================================
  airflow:
    image: apache/airflow:2.11.0
    container_name: airflow
    # [FIX 3] depends_on với healthcheck thay vì loop pg_isready trong command
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres_metadata:5432/metadata_db
      # Install Spark provider + PySpark at container startup
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.7.1 pyspark==3.4.0"
      # Spark connection: Airflow conn_id=spark_default → spark-master:7077
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/airflow_logs:/opt/airflow/logs
      # Mount batch-etl so SparkSubmitOperator can resolve application paths
      # (spark-submit runs on spark-master, but Airflow resolves the path via Docker volume)
      - ./batch-etl:/opt/spark/work-dir/batch-etl
    ports:
      - "8081:8080"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true;
        airflow scheduler &
        airflow webserver
      "
    networks:
      - data-pipeline-network

  superset:
    image: apache/superset
    container_name: superset
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "your_secret_key_here_change_in_production"
    # [FIX 6] Mount volume đã khai báo
    volumes:
      - superset_home:/app/superset_home
    # [FIX 2] Thêm init command: db upgrade + create admin + init trước khi start server
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@superset.com --password admin || true;
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    networks:
      - data-pipeline-network

networks:
  data-pipeline-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  minio_data:
  superset_home:
