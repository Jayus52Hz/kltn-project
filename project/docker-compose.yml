version: '3.8'

services:
  # ==========================================
  # 1. TẦNG SOURCE DATABASES
  # ==========================================
  # Nguồn cấp dữ liệu chính cho hệ thống AGI Telesales
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Kích hoạt ReplicaSet (Yêu cầu bắt buộc để Debezium đọc được sự thay đổi)
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - data-pipeline-network

  # Database phục vụ lưu Metadata cho Airflow, Superset và Iceberg Catalog
  postgres:
    image: postgres:13
    container_name: postgres_metadata
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: metadata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-pipeline-network

  # ==========================================
  # 2. TẦNG STREAMING & CDC
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-pipeline-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data-pipeline-network

  debezium_connect:
    image: debezium/connect:2.1
    container_name: debezium_connect
    depends_on:
      - kafka
      - mongodb
    ports:
      - "8083:8083"
    environment:
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - data-pipeline-network

  # ==========================================
  # 3. TẦNG STORAGE (MINIO)
  # ==========================================
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - data-pipeline-network

  # Tự động tạo các bucket kiến trúc Medallion khi khởi động
  minio-mc:
    image: minio/mc
    container_name: minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/bronze || true;
      mc mb myminio/silver || true;
      mc mb myminio/gold || true;
      exit 0;
      "
    networks:
      - data-pipeline-network

  # ==========================================
  # 4. TẦNG COMPUTE (APACHE SPARK + ICEBERG)
  # ==========================================
  spark-master:
    image: apache/spark:3.4.0
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      # Thông tin kết nối AWS S3 (dùng cho MinIO và Iceberg)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./batch-etl:/opt/spark/work-dir/batch-etl
    networks:
      - data-pipeline-network

  spark-worker:
    image: apache/spark:3.4.0
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./batch-etl:/opt/spark/work-dir/batch-etl
    networks:
      - data-pipeline-network

  # ==========================================
  # 5. TẦNG ORCHESTRATION & BI
  # ==========================================
  airflow:
    image: apache/airflow:2.11.0
    container_name: airflow
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres_metadata:5432/metadata_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/airflow_logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: >
      bash -c "
        until pg_isready -h postgres_metadata -U admin; do sleep 5; done;
        airflow db init;
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin;
        airflow scheduler &
        airflow webserver
      "
    depends_on:
      - postgres
    networks:
      - data-pipeline-network

  superset:
    image: apache/superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "your_secret_key_here"
    depends_on:
      - postgres
    networks:
      - data-pipeline-network

networks:
  data-pipeline-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  minio_data:
  superset_home: