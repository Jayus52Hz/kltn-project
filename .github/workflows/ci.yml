name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint ETL jobs and DAG
        run: |
          flake8 project/batch-etl/ project/airflow/dags/ project/tests/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503,W504 \
            --exclude=__pycache__,*.pyc

      - name: Syntax check init scripts
        run: |
          python -m py_compile project/init/load_data.py
          echo "Syntax OK: load_data.py"

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (PySpark local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: project/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r project/requirements-test.txt

      - name: Run unit tests
        run: |
          pytest project/tests/ \
            -v \
            --tb=short \
            --cov=project/batch-etl \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
        env:
          PYTHONPATH: ${{ github.workspace }}/project

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
